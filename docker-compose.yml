services:
  db:
    image: postgres:18
    container_name: postgres_db
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql
    env_file:
      - .env
    
  fastapi:
    build: .
    container_name: social-media-app
    ports:
      - 8000:8000
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

volumes: 
  pgdata: