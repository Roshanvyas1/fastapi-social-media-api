name: Run tests

on: 
  push:
    branches: [main]                 # Test only starts when push only happens on main branch.
  pull-request:

jobs: 
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_test
        options: >-                        # Health check confirms our db is started and ready for connection.
          --health-cmd pg_ready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    
    env:
      DATABASE_HOSTNAME: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: fastapi                 # Ultimately, it become fastapi_test since our TEST_DATABASE_URL is designed that way.
      SECRET_KEY: ${{settings.SECRET_KEY}}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: "pip"                                  # Collects cached dependencies instead of fresh install.
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v -x --tb=short
